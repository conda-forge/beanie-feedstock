{% set name = "beanie" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/roman-right/beanie/archive/refs/tags/{{ version }}.tar.gz
  sha256: 1069d818f95905892c64922d813aab5fe231a1b8353b0f3d60933b4cd10d653f
  patches:

build:
  entry_points:
    - beanie = beanie.executors.migrate:migrations
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - flit-core
    - python {{ python_min }}
  run:
    - click >=7
    - motor >=2.5,<4.0
    - pydantic >=1.10.0,<3
    - python >={{ python_min }}
    - tomli
    - lazy-model >=0.2.0

test:
  imports:
    - beanie
  commands:
    - pip check
    - beanie --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://roman-right.github.io/beanie/
  dev_url: https://github.com/roman-right/beanie
  summary: Asynchronous Python ODM for MongoDB
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - awvwgk
